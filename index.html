<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Guess Who? 🎭</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Nunito', sans-serif; background: #0d1117; color: #f9fafb; min-height: 100dvh; }

.screen { display: none; min-height: 100dvh; flex-direction: column; align-items: center; }
.screen.active { display: flex; }

/* HOME */
#homeScreen { justify-content: center; padding: 32px 20px; gap: 0; text-align: center; }
.logo-emoji { font-size: 4.5rem; margin-bottom: 10px; line-height: 1; }
.logo-title {
  font-family: 'Fredoka One', cursive;
  font-size: clamp(3rem, 11vw, 5rem);
  background: linear-gradient(130deg, #fbbf24, #f97316, #f472b6);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  margin: 0 0 6px; line-height: 1.1;
}
.logo-sub { color: #4b5563; font-weight: 900; font-size: 1rem; margin-bottom: 48px; }
.btn-play {
  background: linear-gradient(135deg, #f97316, #f472b6);
  border: none; border-radius: 22px; padding: 20px 60px;
  font-family: 'Fredoka One', cursive; font-size: 1.7rem; color: #fff;
  cursor: pointer; box-shadow: 0 8px 32px rgba(249,115,22,.45);
  transition: transform .15s;
}
.btn-play:hover { transform: translateY(-2px); }
.home-hint { margin-top: 24px; color: #374151; font-size: .85rem; font-weight: 700; max-width: 280px; line-height: 1.5; }

/* GAME */
#gameScreen { padding: 14px 12px 48px; }
.game-header {
  display: flex; align-items: center; justify-content: space-between;
  width: 100%; max-width: 600px; margin: 0 auto 14px;
}
.header-title {
  font-family: 'Fredoka One', cursive; font-size: 1.3rem;
  background: linear-gradient(130deg,#fbbf24,#f97316);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.counter {
  background: #161b22; border: 1px solid #30363d; border-radius: 20px;
  padding: 4px 14px; font-size: .8rem; font-weight: 900; color: #6b7280;
}
.btn-new {
  background: #161b22; border: 1px solid #30363d; border-radius: 20px;
  padding: 6px 14px; font-size: .8rem; font-weight: 900; color: #6b7280; cursor: pointer;
  font-family: 'Nunito', sans-serif;
}

/* Secret */
.secret-section { width: 100%; max-width: 600px; margin: 0 auto 18px; }
.section-lbl {
  font-size: .68rem; font-weight: 900; letter-spacing: 2.5px; text-transform: uppercase;
  color: #fbbf24; text-align: center; margin-bottom: 8px;
}
.secret-card {
  background: #161b22; border: 2px solid #fbbf24; border-radius: 18px;
  padding: 12px 16px; display: flex; align-items: center; gap: 14px;
  cursor: pointer; position: relative; overflow: hidden; max-width: 340px; margin: 0 auto;
  transition: border-color .3s;
}
.secret-card.revealed { border-color: #fbbf2455; cursor: default; }
.secret-cover {
  position: absolute; inset: 0; background: rgba(13,17,23,.94);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 6px; border-radius: 16px; z-index: 5; transition: opacity .3s;
}
.secret-card.revealed .secret-cover { opacity: 0; pointer-events: none; }
.secret-cover .lock { font-size: 2.2rem; }
.secret-cover .tap-lbl { font-size: .68rem; font-weight: 900; letter-spacing: 2px; color: #fbbf24; text-transform: uppercase; }
.secret-photo { width: 80px; height: 80px; object-fit: cover; object-position: top; border-radius: 12px; border: 2px solid #30363d; flex-shrink: 0; }
.secret-name { font-family: 'Fredoka One', cursive; font-size: 1.25rem; color: #f9fafb; margin-bottom: 4px; }
.secret-hint { font-size: .75rem; font-weight: 700; color: #6b7280; }

/* Board */
.board-section { width: 100%; max-width: 600px; margin: 0 auto; }
.board-lbl {
  font-size: .68rem; font-weight: 900; letter-spacing: 2px; text-transform: uppercase;
  color: #374151; text-align: center; margin-bottom: 10px;
}
.board {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
}
.char-card {
  background: #161b22; border-radius: 14px; overflow: hidden;
  border: 2px solid #30363d; cursor: pointer; position: relative;
  display: flex; flex-direction: column; align-items: center;
  box-shadow: 0 2px 10px rgba(0,0,0,.4);
  transition: all .18s ease;
}
.char-card:hover:not(.out) {
  transform: translateY(-4px);
  border-color: #fbbf24;
  box-shadow: 0 8px 24px rgba(251,191,36,.25);
}
.char-card.out {
  opacity: .18; filter: grayscale(1); cursor: default; border-color: #1c2128;
}
.char-card.out:hover { transform: none; border-color: #1c2128; box-shadow: none; }
.char-photo { width: 100%; aspect-ratio: 1/1; object-fit: cover; object-position: top; display: block; }
.char-name {
  font-family: 'Fredoka One', cursive; font-size: .68rem; color: #e5e7eb;
  padding: 4px 2px 6px; text-align: center; width: 100%; background: #161b22;
}
.char-card.out .char-name { color: #1f2937; }
.x-mark {
  position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
  font-size: 3rem; pointer-events: none; opacity: 0; transition: opacity .2s;
}
.char-card.out .x-mark { opacity: 1; }

/* WIN */
#winScreen { justify-content: center; padding: 32px 20px; gap: 18px; text-align: center; }
.trophy { font-size: 5rem; animation: pop .6s ease infinite alternate; }
@keyframes pop { 0%{transform:scale(1) rotate(-5deg)} 100%{transform:scale(1.15) rotate(5deg)} }
.win-title {
  font-family: 'Fredoka One', cursive; font-size: clamp(2.2rem,9vw,3.2rem);
  background: linear-gradient(130deg,#fbbf24,#f97316);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  margin: 0;
}
.win-card {
  background: #161b22; border: 2px solid #30363d; border-radius: 22px;
  padding: 20px; display: flex; flex-direction: column; align-items: center; gap: 10px;
}
.win-photo { width: 130px; height: 130px; object-fit: cover; object-position: top; border-radius: 14px; border: 3px solid #fbbf24; }
.win-name { font-family: 'Fredoka One', cursive; font-size: 1.7rem; color: #fbbf24; }
.btn-again {
  background: linear-gradient(135deg, #2dd4bf, #3b82f6); border: none; border-radius: 18px;
  padding: 16px 44px; font-family: 'Fredoka One', cursive; font-size: 1.35rem; color: #fff;
  cursor: pointer; box-shadow: 0 6px 22px rgba(45,212,191,.35); transition: transform .15s;
}
.btn-again:hover { transform: translateY(-2px); }

@media (max-width: 400px) {
  .board { grid-template-columns: repeat(4, 1fr); gap: 6px; }
}
</style>
</head>
<body>

<!-- HOME -->
<div id="homeScreen" class="screen active">
  <div class="logo-emoji">🎭</div>
  <h1 class="logo-title">Guess Who?</h1>
  <p class="logo-sub">English class · A2</p>
  <button class="btn-play" onclick="startGame()">▶ Play!</button>
  <p class="home-hint">You get a secret character.<br>Eliminate the others until one is left!</p>
</div>

<!-- GAME -->
<div id="gameScreen" class="screen">
  <div class="game-header">
    <span class="header-title">🎭 Guess Who?</span>
    <span class="counter" id="counter">15 left</span>
    <button class="btn-new" onclick="startGame()">🔄 New</button>
  </div>

  <div class="secret-section">
    <div class="section-lbl">⭐ Your secret character</div>
    <div class="secret-card" id="secretCard" onclick="revealSecret()">
      <div class="secret-cover">
        <div class="lock">🔒</div>
        <div class="tap-lbl">Tap to reveal</div>
      </div>
      <img class="secret-photo" id="secretPhoto" src="" alt="">
      <div>
        <div class="secret-name" id="secretName"></div>
        <div class="secret-hint">Don't show anyone! 🤫</div>
      </div>
    </div>
  </div>

  <div class="board-section">
    <div class="board-lbl">Tap a face to eliminate ❌</div>
    <div class="board" id="board"></div>
  </div>
</div>

<!-- WIN -->
<div id="winScreen" class="screen">
  <div class="trophy">🏆</div>
  <h2 class="win-title">You got it!</h2>
  <p style="color:#6b7280;font-weight:700">The character was...</p>
  <div class="win-card">
    <img class="win-photo" id="winPhoto" src="" alt="">
    <div class="win-name" id="winName"></div>
  </div>
  <button class="btn-again" onclick="startGame()">🔄 New Round!</button>
</div>

];

let secret = null;
let eliminated = new Set();

function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

function startGame() {
  secret = CHARACTERS[Math.floor(Math.random() * CHARACTERS.length)];
  eliminated = new Set();

  document.getElementById('secretPhoto').src = secret.photo;
  document.getElementById('secretName').textContent = secret.name;
  document.getElementById('secretCard').classList.remove('revealed');

  renderBoard();
  show('gameScreen');
}

function revealSecret() {
  document.getElementById('secretCard').classList.add('revealed');
}

function renderBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  CHARACTERS.forEach(char => {
    const card = document.createElement('div');
    card.className = 'char-card' + (eliminated.has(char.name) ? ' out' : '');
    card.innerHTML = `
      <img class="char-photo" src="${char.photo}" alt="${char.name}">
      <div class="char-name">${char.name}</div>
      <div class="x-mark">❌</div>
    `;
    card.addEventListener('click', () => toggle(char, card));
    board.appendChild(card);
  });
  updateCounter();
}

function toggle(char, card) {
  if (eliminated.has(char.name)) {
    eliminated.delete(char.name);
    card.classList.remove('out');
  } else {
    eliminated.add(char.name);
    card.classList.add('out');
    const remaining = CHARACTERS.filter(c => !eliminated.has(c.name));
    if (remaining.length === 1) {
      setTimeout(() => triggerWin(remaining[0]), 350);
    }
  }
  updateCounter();
}

function updateCounter() {
  const remaining = CHARACTERS.filter(c => !eliminated.has(c.name));
  document.getElementById('counter').textContent = remaining.length + ' left';
}

function triggerWin(char) {
  document.getElementById('winPhoto').src = char.photo;
  document.getElementById('winName').textContent = char.name;
  show('winScreen');
}
</script>
